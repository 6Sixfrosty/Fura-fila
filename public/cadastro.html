<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles/cadastro.css">

    <title>Cadastro</title>
</head>

<body>

    <div class="container cadastro-page d-flex flex-column justify-content-center align-items-center vh-100">
        <div class="cadastro-box w-100">
            <div class="cadastro-brand text-center mb-4">
                <h1 class="cadastro-title mb-2">Criar Conta</h1>
                <p class="cadastro-subtitle mb-0">Preencha os dados abaixo para se cadastrar</p>
            </div>

            <form class="cadastro-form w-100">
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome completo</label>
                    <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="mb-3">
                    <label for="matricula" class="form-label">Matrícula</label>
                    <input type="text" class="form-control" id="matricula" placeholder="Digite sua matrícula" required>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="mb-4">
                    <label for="confirmar-senha" class="form-label">Confirmar senha</label>
                    <input type="password" class="form-control" id="confirmar-senha" placeholder="Repita sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
            </form>

            <div class="login-link text-center mt-3">
                <span>Já possui conta?</span>
                <button type="button" class="login-link-button ms-1" onclick="voltarLogin()">
                    Entrar
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function voltarLogin() {
            await new Promise(resolve => setTimeout(resolve, 400));
            window.location.href = '../index.html';
        }
    </script>
    <script src="./scripts/cadastro.js"></script>
</body>

</html>
