<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles/main.css">

    <title>Login</title>
</head>

<body>

    <div class="container login-page d-flex flex-column justify-content-center align-items-center vh-100">
        <div class="login-box w-100">
            <div class="login-brand text-center mb-4">
                <h1 class="login-title mb-2">Bem-vindo ao Fura-Fila</h1>
                <p class="login-subtitle mb-0">Realize o seu cadastro para começar a Furar Filas</p>
            </div>

            <form class="login-form w-100">
                <div class="boxing mb-3">
                    <label for="matricula" class="form-label">Matrícula</label>
                    <input type="text" class="form-control" id="matricula" placeholder="Digite sua matrícula" required>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <br>
                    <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>

            <div class="register-link text-center mt-3">
                <span>Não possui conta?</span>
                <button type="button" class="register-link-button ms-1" onclick="cadastro()">
                    Cadastre-se
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function cadastro() {
            await new Promise(resolve => setTimeout(resolve, 400));
            window.location.href = '../public/cadastro.html';
        }
    </script>
    <script src="./scripts/login.js"></script>
</body>

</html>
