<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fura-Fila</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles/main/nav-bar.css">
    <link rel="stylesheet" href="./styles/main/sections.css">
    <link rel="stylesheet" href="./styles/pages/cardapio.css">
    <link rel="stylesheet" href="./styles/pages/carrinho.css">
    <link rel="stylesheet" href="./styles/pages/two.css">
</head>

<body>
    <nav class="student-navbar">
        <div class="container-fluid px-2">
            <div class="student-info text-center">
                <div class="info-inline">
                    <span class="info-label">Aluno:</span>
                    <span class="info-value">João Silva</span>
                    <span class="info-separator">|</span>
                    <span class="info-label">Matrícula:</span>
                    <span class="info-value">12345</span>
                </div>
            </div>
        </div>

        <div class="student-menu d-flex justify-content-center align-items-center gap-2 mt-2">
            <a class="menu-btn" href="#" data-page="cardapio">
                <i class="bi bi-journal-text"></i>
                <span>Cardápio</span>
            </a>

            <a class="menu-btn" href="#" data-page="carrinho">
                <i class="bi bi-cart3"></i>
                <span>Carrinho</span>
            </a>

            <a class="menu-btn" href="#" data-page="pedidos">
                <i class="bi bi-bag-check"></i>
                <span>Pedidos</span>
            </a>

            <a class="menu-btn" href="#" onclick="sair()">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sair</span>
            </a>
        </div>
    </nav>

    <main class="p-3 d-flex flex-column gap-3">
        <section id="cardapio" class="page-section">
            <div class="section-header">Cardápio</div>
            <hr>
            <div class="section-content cart-content overflow-y-auto">
                <div class="table-responsive">
                    <table class="table cart-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th scope="col">Lanche</th>
                                <th scope="col" class="text-center">Quantidade</th>
                                <th scope="col" class="text-center">Valor</th>
                                <th scope="col" class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>X-Burguer</td>
                                <td class="text-center">
                                    <div class="qty-control">
                                        <button type="button" class="qty-btn">-</button>
                                        <span class="qty-value">1</span>
                                        <button type="button" class="qty-btn">+</button>
                                    </div>
                                </td>
                                <td class="text-center">R$ 12,00</td>
                                <td class="text-end">12</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="carrinho" class="page-section">
            <div class="section-header">Carrinho</div>
            <hr>
            <div class="section-content cart-section overflow-y-auto">
                <div class="table-responsive">
                    <table class="table cart-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th scope="col">Lanche</th>
                                <th scope="col" class="text-center">Qtd</th>
                                <th scope="col" class="text-end">Valor</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>X-Burguer</td>
                                <td class="text-center">1</td>
                                <td class="text-end">R$ 12,00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="pedidos" class="page-section">
            <div class="section-header">Pedidos</div>
            <hr>
            <div class="section-content pedidos-content">
                <div class="pedidos-list">
                    <a href=" href="ticker.html"" class="pedido-card">
                        <div class="pedido-main">
                            <span class="pedido-id">Pedido #047</span>
                            <span class="pedido-status">Pronto para retirada</span>
                        </div>

                        <div class="pedido-info">
                            <span class="pedido-total">R$ 28,00</span>
                            <i class="bi bi-chevron-right"></i>
                        </div>
                    </a>
                </div>
            </div>
        </section>

<template id="ticket">
    <div class="ticket-card">
        <div class="ticket-header">
            <span class="pedido-id">Pedido #047</span>
            <span class="pedido-status status-pronto">Pronto para retirada</span>
        </div>

        <hr>

        <div class="ticket-itens">
            <div class="ticket-item">
                <span class="ticket-nome">X-Burguer</span>
                <span class="ticket-qty">x1</span>
                <span class="ticket-valor">R$ 12,00</span>
            </div>
            <div class="ticket-item">
                <span class="ticket-nome">Coxinha</span>
                <span class="ticket-qty">x2</span>
                <span class="ticket-valor">R$ 16,00</span>
            </div>
        </div>

        <hr>

        <div class="ticket-footer">
            <span class="ticket-label">Total</span>
            <span class="ticket-total">R$ 28,00</span>
        </div>

        <div class="ticket-pagamento mt-2">
            <span class="ticket-label">Pagamento</span>
            <span class="ticket-forma">Pix</span>
        </div>

        <div class="ticket-hora mt-1">
            <span class="ticket-label">Horário</span>
            <span class="ticket-time">14:32</span>
        </div>
    </div>
</template>
    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./scripts/nav.js"></script>

    <script>
        function sair() {
            window.location.href = '../public/index.html';
        }
    </script>
</body>

</html>
