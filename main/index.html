<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fura-Fila</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles/main/nav-bar.css">
    <link rel="stylesheet" href="./styles/main/sections.css">
    <link rel="stylesheet" href="./styles/pages/cardapio.css">
    <link rel="stylesheet" href="./styles/pages/carrinho.css">
    <link rel="stylesheet" href="./styles/pages/two.css">
</head>

<body>
    <nav class="student-navbar">
        <div class="container-fluid px-2">
            <div class="student-info text-center">
                <div class="info-inline">
                    <span class="info-value" id="student-name">Carregando...</span>
                    <span class="info-separator">|</span>
                    <span class="info-label">Matrícula:</span>
                    <span class="info-value" id="student-matricula">Carregando...</span>
                </div>
            </div>
        </div>

        <div class="student-menu d-flex justify-content-center align-items-center gap-2 mt-2">
            <a class="menu-btn" href="#" data-page="cardapio">
                <i class="bi bi-journal-text"></i>
                <span>Cardápio</span>
            </a>

            <a class="menu-btn" href="#" data-page="carrinho">
                <i class="bi bi-cart3"></i>
                <span>Carrinho</span>
            </a>

            <a class="menu-btn" href="#" data-page="pedidos">
                <i class="bi bi-bag-check"></i>
                <span>Pedidos</span>
            </a>

            <a class="menu-btn" href="#" onclick="sair()">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sair</span>
            </a>
        </div>
    </nav>

    <main class="p-3 d-flex flex-column gap-3">
        <section id="cardapio" class="page-section">
            <div class="section-header">Cardápio</div>
            <hr>
            <div class="section-content cart-content overflow-y-auto">
                <div class="table-responsive">
                    <table class="table cart-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th scope="col">Lanche</th>
                                <th scope="col" class="text-center">Disponível</th>
                                <th scope="col" class="text-center">Qtd</th>
                                <th scope="col" class="text-center">Valor</th>
                                <th scope="col" class="text-end">Total</th>
                                <th scope="col" class="text-center">Ação</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="carrinho" class="page-section">
            <div class="section-header">Carrinho</div>
            <hr>
            <div class="section-content cart-section overflow-y-auto">
                <div class="table-responsive">
                    <table class="table cart-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th scope="col">Lanche</th>
                                <th scope="col" class="text-center">Qtd</th>
                                <th scope="col" class="text-center">Valor unit.</th>
                                <th scope="col" class="text-end">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <template id="pagamento-template">
                    <div class="pagamento-box mt-3">
                        <div class="pagamento-header">
                            <span class="pagamento-title">Pagamento</span>
                        </div>

                        <div class="pagamento-opcoes mt-3">
                            <label class="pagamento-opcao">
                                <input type="radio" name="forma_pagamento" value="Dinheiro" checked>
                                <span>Dinheiro</span>
                            </label>

                            <label class="pagamento-opcao">
                                <input type="radio" name="forma_pagamento" value="Pix">
                                <span>Pix</span>
                            </label>
                        </div>

                        <div class="carrinho-resumo mt-3">
                            <div class="resumo-linha">
                                <span>Total geral</span>
                                <strong id="total-geral-carrinho">R$ 0,00</strong>
                            </div>
                        </div>

                        <button type="button" class="btn btn-primary w-100 mt-3" id="btn-finalizar-pedido">
                            Finalizar pedido
                        </button>
                    </div>
                </template>

                <div id="pagamento-container"></div>
            </div>
        </section>

        <section id="pedidos" class="page-section">
            <div class="section-header">Pedidos</div>
            <hr>

            <div class="section-content pedidos-content">
                <div class="pedidos-list"></div>

                <div id="pedido-detalhe" class="pedido-detalhe mt-3" style="display: none;">
                    <div class="pedido-card">
                        <div class="pedido-main">
                            <span id="detalhe-id" class="pedido-id"></span>
                            <span id="detalhe-status" class="pedido-status"></span>
                        </div>

                        <div class="pedido-info">
                            <span id="detalhe-total" class="pedido-total"></span>
                        </div>
                    </div>

                    <div class="pedido-extra mt-2 p-3">
                        <p class="mb-1"><strong>Quantidade:</strong> <span id="detalhe-quantidade"></span></p>
                        <p class="mb-0"><strong>Criado em:</strong> <span id="detalhe-data"></span></p>
                    </div>
                </div>
            </div>
        </section>

        <template id="ticket">
            <a href="#" class="pedido-card">
                <div class="pedido-main">
                    <span class="pedido-id"></span>
                    <span class="pedido-status"></span>
                </div>

                <div class="pedido-info">
                    <span class="pedido-total"></span>
                    <i class="bi bi-chevron-right"></i>
                </div>
            </a>
        </template>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./scripts/auth.js"></script>
    <script src="./scripts/api.js"></script>
    <script src="./scripts/render.js"></script>
    <script src="./scripts/nav.js"></script>
</body>

</html>
