<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fura-Fila</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styles/main/nav-bar.css">
    <link rel="stylesheet" href="./styles/main/sections.css">
    <link rel="stylesheet" href="./styles/pages/cardapio.css">
    <link rel="stylesheet" href="./styles/pages/carrinho.css">
    <link rel="stylesheet" href="./styles/pages/two.css">
    <style>
        .page-section{
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <nav class="student-navbar">
        <div class="container-fluid px-2">
            <div class="student-info text-center">
                <div class="info-inline">
                    <span class="info-label">Aluno:</span>
                    <span class="info-value">João Silva</span>
                    <span class="info-separator">|</span>
                    <span class="info-label">Matrícula:</span>
                    <span class="info-value">12345</span>
                </div>
            </div>
        </div>

        <div class="student-menu d-flex justify-content-center align-items-center gap-2 mt-2">
            <a class="menu-btn" href="#" data-page="cardapio">
                <i class="bi bi-journal-text"></i>
                <span>Cardápio</span>
            </a>

            <a class="menu-btn" href="#" data-page="carrinho">
                <i class="bi bi-cart3"></i>
                <span>Carrinho</span>
            </a>

            <a class="menu-btn" href="#" data-page="pedidos">
                <i class="bi bi-bag-check"></i>
                <span>Pedidos</span>
            </a>

            <a class="menu-btn" href="#" onclick="sair()">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sair</span>
            </a>
        </div>
    </nav>
    <main class="p-3 d-flex flex-column gap-3">
        <section id="pedidos" class="page-section">
            <div class="section-header">Pedidos</div>
            <hr>
            <div class="ticket-header">
                <span class="pedido-id">Pedido #047</span>
                <span class="pedido-status status-pronto">Pronto para retirada</span>
            </div>

            <hr>

            <div class="ticket-itens">
                <div class="ticket-item">
                    <span class="ticket-nome">X-Burguer</span>
                    <span class="ticket-qty">x1</span>
                    <span class="ticket-valor">R$ 12,00</span>
                </div>
                <div class="ticket-item">
                    <span class="ticket-nome">Coxinha</span>
                    <span class="ticket-qty">x2</span>
                    <span class="ticket-valor">R$ 16,00</span>
                </div>
            </div>

            <hr>

            <div class="ticket-footer">
                <span class="ticket-label">Total</span>
                <span class="ticket-total">R$ 28,00</span>
            </div>

            <div class="ticket-pagamento mt-2">
                <span class="ticket-label">Pagamento</span>
                <span class="ticket-forma">Pix</span>
            </div>

            <div class="ticket-hora mt-1">
                <span class="ticket-label">Horário</span>
                <span class="ticket-time">14:32</span>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
